<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Anual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent-blue: #3B82F6;
    --accent-green: #22C55E;
    --accent-orange: #F59E0B;
    --accent-red: #E42313;
    --bg-card: #FFFFFF;
    --bg-header: #FFFFFF;
    --bg-holiday: #FEF2F2;
    --bg-page: #F5F5F7;
    --bg-today: #EFF6FF;
    --bg-vacation: #F0FDF4;
    --bg-weekend: #F5F5F5;
    --bg-working: #FFFFFF;
    --border: #E8E8E8;
    --text-muted: #B0B0B0;
    --text-primary: #0D0D0D;
    --text-secondary: #7A7A7A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--bg-header);
    height: 72px;
    padding: 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-left svg { color: var(--accent-red); }
  .header-left h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .year-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-primary);
    transition: background .15s;
  }
  .year-btn:hover { background: var(--bg-page); }
  .year-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 52px;
    text-align: center;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mode-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-secondary);
  }
  .mode-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 4px;
  }
  .mode-btn.mode-festivo { background: var(--bg-holiday); border-color: #FECACA; color: #DC2626; }
  .mode-btn.mode-festivo .dot { background: var(--accent-red); }
  .mode-btn.mode-vacaciones { background: var(--bg-vacation); border-color: #BBF7D0; color: #16A34A; }
  .mode-btn.mode-vacaciones .dot { background: var(--accent-green); }
  .mode-btn.active {
    outline: 3px solid var(--accent-blue);
    outline-offset: 1px;
  }
  .btn-reset {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-reset:hover { background: var(--bg-page); }
  .btn-reset svg { width: 14px; height: 14px; }

  /* ===== CONTENT ===== */
  .content {
    padding: 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ===== STATS ROW ===== */
  .stats-row {
    display: flex;
    gap: 16px;
  }
  .stat-card {
    flex: 1;
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: 100px;
  }
  .stat-card .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 600;
  }
  .stat-card .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stat-card.tracker {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  .tracker-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .tracker-left label {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .tracker-left input {
    width: 60px;
    height: 32px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #FAFAFA;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .tracker-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .tracker-right .tracker-label {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .vacation-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .vacation-badge.ok { background: var(--bg-vacation); color: #16A34A; }
  .vacation-badge.warn { background: #FEF9C3; color: #CA8A04; }
  .vacation-badge.over { background: var(--bg-holiday); color: #DC2626; }

  /* ===== LEGEND ===== */
  .legend {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* ===== CALENDAR GRID ===== */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  /* ===== MONTH CARD ===== */
  .month-card {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .month-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
  }
  .month-header .month-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .month-header .month-stats {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .month-divider {
    height: 1px;
    background: var(--border);
  }
  .month-body {
    padding: 8px 12px 12px;
  }
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 2px;
  }
  .weekday-row div {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 4px 0;
  }
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .day-cell {
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 400;
    border-radius: 6px;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    user-select: none;
    color: var(--text-primary);
  }
  .day-cell:hover:not(.empty) {
    transform: scale(1.12);
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
    z-index: 2;
    position: relative;
  }
  .day-cell.empty { cursor: default; }
  .day-cell.laborable { background: var(--bg-working); }
  .day-cell.weekend { background: var(--bg-weekend); color: var(--text-muted); }
  .day-cell.festivo { background: var(--bg-holiday); color: #DC2626; font-weight: 500; }
  .day-cell.vacaciones { background: var(--bg-vacation); color: #16A34A; font-weight: 500; }
  .day-cell.today {
    background: var(--bg-today);
    outline: 1.5px solid var(--accent-blue);
    outline-offset: -1px;
    color: var(--accent-blue);
    font-weight: 600;
  }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 1200px) {
    .calendar-grid { grid-template-columns: repeat(3, 1fr); }
    header { padding: 0 24px; }
    .content { padding: 24px; }
  }

  @media (max-width: 768px) {
    /* Mobile header */
    header {
      height: auto;
      padding: 12px 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left svg { width: 20px; height: 20px; }
    .header-left h1 { font-size: 18px; }
    .header-left { gap: 10px; }
    .header-center { gap: 8px; order: 0; }
    .year-btn { width: 32px; height: 32px; }
    .year-label { font-size: 16px; }
    .header-right {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      width: 100%;
      order: 1;
    }
    .mode-btn, .btn-reset {
      width: 100%;
      height: 32px;
      padding: 0;
      justify-content: center;
      font-size: 12px;
      gap: 5px;
    }
    .mode-btn .dot { width: 6px; height: 6px; border-radius: 3px; }

    /* Mobile content */
    .content {
      padding: 16px;
      gap: 16px;
    }

    /* Mobile stats: 2x2 grid + tracker */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      border-radius: 10px;
      padding: 12px 14px;
      gap: 4px;
      height: 72px;
    }
    .stat-card .stat-value { font-size: 24px; }
    .stat-card .stat-label { font-size: 11px; }
    .stat-card.tracker {
      grid-column: 1 / -1;
      height: 56px;
      padding: 12px 16px;
      border-radius: 10px;
    }
    .tracker-left label { font-size: 12px; }
    .tracker-left input {
      width: 48px;
      height: 28px;
      font-size: 16px;
    }
    .tracker-right .tracker-label { font-size: 11px; }

    /* Mobile legend */
    .legend {
      justify-content: space-between;
      gap: 0;
    }
    .legend-item { gap: 4px; font-size: 10px; }
    .legend-swatch { width: 8px; height: 8px; border-radius: 2px; }
    .legend-label-full { display: none; }
    .legend-label-short { display: inline; }

    /* Mobile calendar */
    .calendar-grid { grid-template-columns: 1fr; gap: 16px; }
    .month-card { border-radius: 10px; }
    .month-header { padding: 10px 12px; }
    .month-header .month-name { font-size: 14px; }
    .month-header .month-stats { font-size: 10px; }
    .month-body { padding: 6px 8px 8px; }
    .weekday-row div { font-size: 10px; }
    .days-grid { gap: 2px; }
    .day-cell { height: 32px; font-size: 13px; }
  }

  /* Desktop: show full labels, hide short */
  .legend-label-short { display: none; }
  @media (max-width: 768px) {
    .legend-label-short { display: inline; }
    .legend-label-full { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg>
    <h1>Calendario Anual</h1>
  </div>
  <div class="header-center">
    <button class="year-btn" id="yearPrev">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="year-label" id="yearLabel"></span>
    <button class="year-btn" id="yearNext">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="header-right">
    <button class="mode-btn mode-festivo active" data-mode="festivo"><span class="dot"></span>Festivo</button>
    <button class="mode-btn mode-vacaciones" data-mode="vacaciones"><span class="dot"></span>Vacaciones</button>
    <button class="btn-reset" id="btnReset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Reset
    </button>
  </div>
</header>

<div class="content">
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <span class="stat-value" id="valLaborable" style="color:var(--text-primary)">0</span>
      <span class="stat-label"><span class="legend-label-full">Dias laborables</span><span class="legend-label-short">Laborables</span></span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="valFestivo" style="color:var(--accent-red)">0</span>
      <span class="stat-label">Festivos</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="valVacaciones" style="color:var(--accent-green)">0</span>
      <span class="stat-label"><span class="legend-label-full">Vacaciones usadas</span><span class="legend-label-short">Vacaciones</span></span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="valWeekend" style="color:var(--accent-blue)">0</span>
      <span class="stat-label">Fines de semana</span>
    </div>
    <div class="stat-card tracker">
      <div class="tracker-left">
        <label><span class="legend-label-full">Vacaciones / año</span><span class="legend-label-short">Vacaciones restantes</span></label>
        <input type="number" id="vacDays" min="0" max="365" value="22">
      </div>
      <div class="tracker-right">
        <span class="tracker-label">Quedan</span>
        <div class="vacation-badge ok" id="vacRemaining">22 días</div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--bg-working);border:1px solid var(--border)"></div>
      <span class="legend-label-full">Laborable</span><span class="legend-label-short">Lab.</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--bg-weekend);border:1px solid #D4D4D4"></div>
      <span class="legend-label-full">Fin de semana</span><span class="legend-label-short">Finde</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--bg-holiday);border:1px solid #F8B4B4"></div>
      <span class="legend-label-full">Festivo</span><span class="legend-label-short">Festivo</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--bg-vacation);border:1px solid #86EFAC"></div>
      <span class="legend-label-full">Vacaciones</span><span class="legend-label-short">Vac.</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--bg-today);border:1px solid var(--accent-blue)"></div>
      <span>Hoy</span>
    </div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const WEEKDAYS = ['L','M','X','J','V','S','D'];

const calendarGrid = document.getElementById('calendarGrid');
const btnReset = document.getElementById('btnReset');
const vacDaysInput = document.getElementById('vacDays');
const vacRemainingEl = document.getElementById('vacRemaining');
const yearLabel = document.getElementById('yearLabel');

let vacationAllowance = {};
let currentYear = new Date().getFullYear();
let currentMode = 'festivo';
let markedDays = {};
let isMouseDown = false;
let justToggledKey = null;

function setYear(y) {
  currentYear = y;
  yearLabel.textContent = y;
  vacDaysInput.value = vacationAllowance[currentYear] || 22;
  render();
}

document.getElementById('yearPrev').addEventListener('click', () => setYear(currentYear - 1));
document.getElementById('yearNext').addEventListener('click', () => setYear(currentYear + 1));

vacDaysInput.addEventListener('input', () => {
  vacationAllowance[currentYear] = parseInt(vacDaysInput.value) || 0;
  save();
  updateVacationTracker();
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  });
});

btnReset.addEventListener('click', () => {
  if (confirm('¿Resetear todas las marcas del año ' + currentYear + '?')) {
    const prefix = currentYear + '-';
    Object.keys(markedDays).forEach(k => { if (k.startsWith(prefix)) delete markedDays[k]; });
    save();
    render();
  }
});

document.addEventListener('mousedown', () => isMouseDown = true);
document.addEventListener('mouseup', () => { isMouseDown = false; justToggledKey = null; });

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function isWeekend(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 || dow === 6;
}

function toggleDay(key, y, m, d) {
  if (isWeekend(y, m, d)) return;
  if (markedDays[key] === currentMode) {
    delete markedDays[key];
  } else {
    markedDays[key] = currentMode;
  }
  save();
  render();
}

function applyDay(key, y, m, d) {
  if (isWeekend(y, m, d)) return;
  if (markedDays[key] !== currentMode) { markedDays[key] = currentMode; save(); render(); }
}

function render() {
  calendarGrid.innerHTML = '';
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let totalFestivo = 0, totalVacaciones = 0, totalLaborable = 0, totalWeekend = 0;

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'month-card';

    const daysInMonth = new Date(currentYear, m + 1, 0).getDate();
    const firstDow = (new Date(currentYear, m, 1).getDay() + 6) % 7;

    let mFestivo = 0, mVacaciones = 0, mLaborable = 0;

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(currentYear, m, d);
      if (isWeekend(currentYear, m, d)) {
        totalWeekend++;
      } else if (markedDays[key] === 'festivo') {
        mFestivo++; totalFestivo++;
      } else if (markedDays[key] === 'vacaciones') {
        mVacaciones++; totalVacaciones++;
      } else {
        mLaborable++; totalLaborable++;
      }
    }

    card.innerHTML = `
      <div class="month-header">
        <span class="month-name">${MONTHS[m]}</span>
        <span class="month-stats">F:${mFestivo}  V:${mVacaciones}  L:${mLaborable}</span>
      </div>
      <div class="month-divider"></div>
      <div class="month-body">
        <div class="weekday-row">${WEEKDAYS.map(w => `<div>${w}</div>`).join('')}</div>
        <div class="days-grid" data-month="${m}"></div>
      </div>
    `;

    const grid = card.querySelector('.days-grid');

    for (let i = 0; i < firstDow; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const key = dateKey(currentYear, m, d);
      let cls = 'day-cell';
      if (key === todayKey) cls += ' today';
      else if (isWeekend(currentYear, m, d)) cls += ' weekend';
      else if (markedDays[key] === 'festivo') cls += ' festivo';
      else if (markedDays[key] === 'vacaciones') cls += ' vacaciones';
      else cls += ' laborable';
      cell.className = cls;
      cell.textContent = d;
      cell.addEventListener('mousedown', (e) => { e.preventDefault(); justToggledKey = key; toggleDay(key, currentYear, m, d); });
      cell.addEventListener('mouseenter', () => { if (isMouseDown && key !== justToggledKey) applyDay(key, currentYear, m, d); });
      grid.appendChild(cell);
    }

    const totalCells = firstDow + daysInMonth;
    const remainder = totalCells % 7;
    if (remainder > 0) {
      for (let i = 0; i < 7 - remainder; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        grid.appendChild(empty);
      }
    }

    calendarGrid.appendChild(card);
  }

  document.getElementById('valLaborable').textContent = totalLaborable;
  document.getElementById('valFestivo').textContent = totalFestivo;
  document.getElementById('valVacaciones').textContent = totalVacaciones;
  document.getElementById('valWeekend').textContent = totalWeekend;

  updateVacationTracker(totalVacaciones);
}

function updateVacationTracker(usedVacaciones) {
  if (usedVacaciones === undefined) {
    usedVacaciones = 0;
    const prefix = currentYear + '-';
    Object.keys(markedDays).forEach(k => { if (k.startsWith(prefix) && markedDays[k] === 'vacaciones') usedVacaciones++; });
  }
  const total = vacationAllowance[currentYear] || 22;
  const remaining = total - usedVacaciones;
  vacRemainingEl.textContent = remaining >= 0 ? `${remaining} días` : `-${Math.abs(remaining)} días`;
  vacRemainingEl.className = 'vacation-badge ' + (remaining > 5 ? 'ok' : remaining >= 0 ? 'warn' : 'over');
}

function save() {
  localStorage.setItem('jals-calendar', JSON.stringify(markedDays));
  localStorage.setItem('jals-calendar-vac', JSON.stringify(vacationAllowance));
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem('jals-calendar'));
    if (data) markedDays = data;
  } catch(e) {}
  try {
    const data = JSON.parse(localStorage.getItem('jals-calendar-vac'));
    if (data) vacationAllowance = data;
  } catch(e) {}
  vacDaysInput.value = vacationAllowance[currentYear] || 22;
}

load();
setYear(currentYear);
</script>
</body>
</html>
